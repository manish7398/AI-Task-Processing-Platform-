apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mern-ai-tasks
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourusername/mern-infrastructure
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: mern-ai-tasks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m